<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Generate Link</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: #1d68d5; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2563eb; }
        #result { margin-top: 25px; padding: 15px; background: #0f172a; border-radius: 6px; display: none; }
        #finalLink { background: #1e293b; border: 1px dashed #475569; }
    </style>
</head>
<body>

<div class="box">
    <h2>Generate Link Video</h2>
    <input type="text" id="vidUrl" placeholder="Masukkan URL Video (Direct/Embed)">
    <button onclick="generateLink()">Generate Link</button>

    <div id="result">
        <p style="font-size: 0.9rem; margin-bottom: 5px; color: #94a3b8;">Link Berhasil Dibuat:</p>
        <input type="text" id="finalLink" readonly onclick="this.select()">
    </div>
</div>

<script>
    // Inisialisasi Supabase
    const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    async function generateLink() {
        const url = document.getElementById('vidUrl').value;
        if (!url) { alert("Harap masukkan URL video!"); return; }

        // Membuat string acak 9 karakter (tanpa awalan v-)
        const uniqueCode = Math.random().toString(36).substr(2, 6);

        // Simpan ke Supabase
        const { error } = await client.from('videos_list').insert([{ 
            name: "Video Tanpa Judul", 
            video_url: url, 
            access_code: uniqueCode 
        }]);

        if (error) { 
            alert("Gagal menyimpan ke database: " + error.message); 
        } else {
            // Generate link dengan format: domain.com/d/hurufacak.mp4
            const link = window.location.origin + "/d/" + uniqueCode;
            
            document.getElementById('finalLink').value = link;
            document.getElementById('result').style.display = 'block';
        }
    }
</script>

</body>
</html>
