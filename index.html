<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>video player</title>    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    
    <style>
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0;
            background: #000; color: white; font-family: sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }

        .container { 
            flex-grow: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
            height: 100%; overflow: hidden;
        }

        /* Area pemutar video sekarang memenuhi layar penuh */
        #player-area { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        
        iframe, video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="player-area"></div>
    </div>

<script>
(function() {
   
    var popunderUrl = "https://braverybreezebinding.com/scj52aaa?key=8047b6e6695828771a2f441f87aba775";
    var cooldownTime = 60000; 

    function sanitizeInput(str) {
        if (!str) return '';
        return str.replace(/[^a-zA-Z0-9\-_]/g, '');
    }

    function isValidURL(string) {
        try { new URL(string); return true; } catch (_) { return false; }
    }

    function triggerPopunder(e) {
        if (e && e.type === 'contextmenu') e.preventDefault();
        if (e && e.target && (e.target.classList.contains('close-btn') || e.target.classList.contains('close-overlay'))) return;

        var currentTime = new Date().getTime();
        var lastAdTime = localStorage.getItem('lastPopunderTime');

        if (lastAdTime && (currentTime - lastAdTime < cooldownTime)) return;

        var currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('autoplay', '1'); 
        
        var fakeLink = document.createElement('a');
        fakeLink.href = currentUrl.toString();
        fakeLink.target = '_blank';
        fakeLink.rel = 'noopener noreferrer';
        document.body.appendChild(fakeLink);
        
        try {
            fakeLink.click();
            document.body.removeChild(fakeLink);
            localStorage.setItem('lastPopunderTime', currentTime);
            setTimeout(function() { window.location.replace(popunderUrl); }, 100);
        } catch (err) {
            window.location.href = popunderUrl;
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if (typeof CONFIG === 'undefined' || !window.supabase) return;
        
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const params = new URLSearchParams(window.location.search);
        
        let rawCode = params.get('v') || window.location.pathname.split('/').pop().replace('.mp4', '');
        let code = sanitizeInput(rawCode);
        let forceAutoplay = params.get('autoplay') === '1';

        if (!code) {
            document.getElementById('player-area').innerHTML = "<div style='color:#fff'>Kode video tidak valid.</div>";
            return;
        }

        try {
            const { data, error } = await client.from('videos_list').select('video_url').eq('access_code', code).single();
            if (error || !data || !data.video_url) throw new Error();

            const playerArea = document.getElementById('player-area');
            const url = data.video_url;

            if (!isValidURL(url) && !url.includes('blob:')) throw new Error();

            if (url.includes('.mp4') || url.includes('blob:')) {
                var videoAttributes = 'controls playsinline';
                if (forceAutoplay) {
                    videoAttributes += ' autoplay muted'; 
                } else {
                    videoAttributes += ' autoplay';
                }

                // Bagian elemen iklan overlay saat pause sudah dihapus total dari sini
                playerArea.innerHTML = `<video id="main-video" src="${url}" ${videoAttributes}></video>`;

                const videoEl = document.getElementById('main-video');

                if (forceAutoplay) {
                    videoEl.play().catch(function(err) {
                        console.log("Autoplay diblokir browser, memerlukan interaksi manual.");
                    });
                }

                videoEl.addEventListener('play', function() { triggerPopunder(); });
                videoEl.addEventListener('click', triggerPopunder);
                videoEl.addEventListener('touchend', triggerPopunder);
                videoEl.addEventListener('contextmenu', triggerPopunder);

            } else {
                var iframeUrl = new URL(url);
                if (forceAutoplay) {
                    iframeUrl.searchParams.set('autoplay', '1');
                    iframeUrl.searchParams.set('mute', '1');
                }

                playerArea.innerHTML = `<iframe id="main-iframe" src="${iframeUrl.toString()}" allow="autoplay; fullscreen" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-popups allow-same-origin allow-scripts"></iframe>`;
                
                playerArea.style.position = 'relative';
                const overlay = document.createElement('div');
                overlay.style = "position:absolute; top:0; left:0; width:100%; height:100%; z-index:999; cursor:pointer;";
                playerArea.appendChild(overlay);

                overlay.addEventListener('click', function() { triggerPopunder(); overlay.remove(); });
                overlay.addEventListener('contextmenu', triggerPopunder);
            }
        } catch (err) {
            document.getElementById('player-area').innerHTML = "<div style='color:#fff'>Video tidak tersedia.</div>";
        }
    });

    document.addEventListener('click', triggerPopunder, false);
    document.addEventListener('touchend', triggerPopunder, false);
    document.addEventListener('contextmenu', triggerPopunder, false);
})();
</script>

<script src="/tracker.js"></script>
    <script src="https://braverybreezebinding.com/24/80/7a/24807af29054aa09c282aaebed9201af.js"></script>

</body>
</html>
