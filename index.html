    <style>
        @keyframes spin-smooth {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinner-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #3b82f6; 
            border-right: 1px solid rgba(59, 130, 246, 0.2);
            animation: spin-smooth 0.8s linear infinite;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
        }

        body {
            background-color: #1a202c; 
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-400 font-sans selection:bg-blue-500/30">

    <header class="p-4 border-b border-white/5 flex items-center justify-between">

    <main class="flex-grow flex items-center justify-center p-4">
    <!-- Spinner Awal (Berputar 1.2 detik) -->

            クリックして続行

</main>

    <script>
// Fungsi untuk memanipulasi slug URL (Tetap dipertahankan sesuai kode asli Anda)
setTimeout(() => {
  const c = "abcdefghijklmnopqrstuvwxyz0123456789";
  let slug = "";
  for (let i = 0; i < 4; i++) {
    slug += c[Math.floor(Math.random() * c.length)];
  }
  history.replaceState(null, "", "/" + slug);
}, 200);

// Logika Baru: Menghilangkan spinner dan memunculkan tombol klik
setTimeout(() => {
  const spinner = document.getElementById("loading-spinner");
  const ctaContainer = document.getElementById("cta-container");
  
  if (spinner && ctaContainer) {
    spinner.style.display = "none"; // Sembunyikan spinner
    ctaContainer.classList.remove("hidden"); // Tampilkan tombol
  }
}, 1200); // Spinner berputar selama 1.2 detik sebelum tombol muncul

// Logika Baru: Membuka Smartlink HANYA saat tombol diklik oleh manusia
document.getElementById("btn-proceed").addEventListener("click", function() {

});
