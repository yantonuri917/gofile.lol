        .gofile-toolbar {

        .tool-btn { background-color: #202c3c; color: #ced5e0; border: 1px solid #2d3d52; padding: 7px 14px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; height: 38px; }

        .file-list-container { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
        
        .file-row { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start;
            background-color: transparent; 
            position: relative; 
            border-bottom: 1px solid #1e293b; 
            padding-bottom: 16px; 
            gap: 16px;
        }

        .file-media-render-zone {
            display: flex;
            flex-shrink: 0;
        }

        .preview-card-box {
            width: 140px;
            height: 90px;
            background-color: #000000;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #1e293b;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .preview-card-box video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background-color: #000000;
        }
        
        .preview-card-box::after {
            content: '\f04b';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .preview-card-box:hover::after { opacity: 1; }

        .file-top-control-bar {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            gap: 14px;
            height: 90px;
        }

        .file-header-info { 
            display: flex; 
            flex-direction: column; 
            flex: 1;
            min-width: 0;
        }
        .file-name { font-size: 15px; font-weight: 600; color: #ffffff; word-break: break-all; line-height: 1.4; }
        .file-meta-sub { font-size: 12px; color: #627d98; margin-top: 4px; display: flex; flex-direction: row; gap: 12px; }

        .file-actions-right { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-shrink: 0;
            margin-left: auto;
        }
        .btn-gofile-action { background-color: #192330; color: #ffffff; border: 1px solid #2d3d52; padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-gofile-action:hover { background-color: #253346; }
        .btn-more-vertical { background-color: transparent; border: none; color: #627d98; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

       
        .file-row.is-expanded {
            flex-direction: column;
            gap: 12px;
        }
        .file-row.is-expanded .file-top-control-bar {
            width: 100%;
            height: auto;
        }
        .file-row.is-expanded .file-media-render-zone {
            width: 100%;
        }
        .file-row.is-expanded .preview-card-box { 
            width: 100%; 
            max-width: 720px; 
            height: auto; 
            aspect-ratio: 16 / 9; 
            cursor: default;
        }
        .file-row.is-expanded .preview-card-box::after { display: none; }
        .file-row.is-expanded .preview-card-box video { 
            object-fit: contain; 
        }
        
        .pagination-text { text-align: center; font-size: 13px; color: #627d98; margin: 20px 0 10px; }

        .pagination-container button:disabled {

            cursor: not-allowed;
        }

        .pagination-container span {
            font-size: 13px;
            color: #bdc8d3;
            font-weight: 500;
            min-width: 80px;
            text-align: center;
        }

       
        @media (max-width: 992px) {
            aside {
                position: fixed;
                height: 100vh;
                left: 0;

                transform: translateX(-240px);
                margin-left: 0;

            body.sidebar-toggled aside { transform: translateX(0); margin-left: 0; }
            body:not(.sidebar-toggled) .workspace { margin-left: 0; }
            body.sidebar-toggled .workspace { margin-left: 0; }

            .gofile-toolbar .tool-btn span { display: none; }
            .gofile-toolbar .tool-btn { padding: 10px 12px; font-size: 16px; justify-content: center; min-width: 42px; height: 42px; }
            .gofile-toolbar .tool-btn .fa-caret-down { display: none; }

            .file-row { gap: 12px; }

            .file-row.is-expanded .preview-card-box {

                aspect-ratio: 16 / 9;
            }
        }
      
        .file-row.is-expanded .preview-card-box iframe {
            width: 100%;
            height: 100%;
        }

<script>
    const SUPABASE_URL = "https://cxxgioehprdzmyghdgim.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4eGdpb2VocHJkem15Z2hkZ2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MzI2MjYsImV4cCI6MjA5NTUwODYyNn0.UsYsI99x-kiEnrBF9U5QsCq7H9XdF5a4_g4mKRizBxw";
    
    let databaseFiles = [];
    let currentPage = 1;
    const itemsPerPage = 5; 

   
    window.onload = function() {
        document.getElementById('folderTime').innerText = new Date().toLocaleString('en-US', { hour12: true });
        fetchVideosFromDatabase();
    };

    async function fetchVideosFromDatabase() {
        const from = (currentPage - 1) * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/videos_list?order=id.desc&limit=${itemsPerPage}&offset=${from}`, {
                method: 'GET',
                headers: { 
                    'Authorization': `Bearer ${SUPABASE_KEY}`, 
                    'apikey': SUPABASE_KEY,
                    'Range-Unit': 'items',
                    'Range': `${from}-${to}`
                }
            });
            if (!response.ok) throw new Error('Gagal memuat database.');
            databaseFiles = await response.json();
            renderFileList();
            renderPaginationControls();
        } catch (error) { console.error(error); }
    }

    function renderFileList() {
        const container = document.getElementById('fileListContainer');
        document.getElementById('totalFilesBadge').innerText = databaseFiles.length;

        container.innerHTML = databaseFiles.map(file => {
            const dateClean = file.created_at ? new Date(file.created_at).toLocaleString('en-US', { hour12: true }) : '5/27/2026, 11:41:34 PM';
            const isEmbed = file.url.includes('videas.fr');
            const mediaTag = isEmbed 
                ? `<iframe src="${file.url}" frameborder="0" allowfullscreen></iframe>` 
                : `<video preload="metadata" src="${file.url}#t=0.5" muted playsinline controlsList="nodownload"></video>`;

            return `
                <div class="file-row" id="row-${file.id}">
                    <div class="file-media-render-zone">
                        <div class="preview-card-box" onclick="handleThumbnailClick(this)">${mediaTag}</div>
                    </div>
                    <div class="file-top-control-bar">
                        <div class="file-header-info">
                            <span class="file-name">${file.name}</span>
                            <div class="file-meta-sub"><span><i class="fa-regular fa-calendar"></i> ${dateClean}</span></div>
                        </div>
                        <div class="file-actions-right">
                            <button class="btn-gofile-action btn-play-toggle" onclick="toggleVideoPlayer(this)">
                                <i class="fa-solid fa-play"></i> <span>Play</span>
                            </button>
                            <button class="btn-gofile-action" onclick="window.open('https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb', '_blank')">
                                <i class="fa-solid fa-download"></i> <span>Download</span>
                            </button>
                            <button class="btn-more-vertical"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                        </div>
                    </div>
                </div>`;
        }).join('');

        const startItem = (currentPage - 1) * itemsPerPage + 1;
        const endItem = (currentPage - 1) * itemsPerPage + databaseFiles.length;
        document.getElementById('paginationSummary').innerText = databaseFiles.length > 0 ? `Show items ${startItem} - ${endItem}` : 'Tidak ada data';
    }

   
    function changePage(newPage) {
        if (newPage < 1) return;
        currentPage = newPage;
        fetchVideosFromDatabase();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPaginationControls() {
        const container = document.getElementById('paginationContainer');
        if (!container) return;
        
        let html = `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>`;

        
        let startPage = Math.max(1, currentPage - 1);
        let endPage = startPage + 2;

        for (let i = startPage; i <= endPage; i++) {
            html += `
                <button onclick="changePage(${i})" class="${i === currentPage ? 'active-page' : ''}">
                    ${i}
                </button>`;
        }

        html += `<button onclick="changePage(${currentPage + 1})" ${databaseFiles.length < itemsPerPage ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>`;
        container.innerHTML = html;
    }

    
    function toggleSidebar() { document.body.classList.toggle('sidebar-toggled'); }
    function closeSidebar() { document.body.classList.remove('sidebar-toggled'); }
    function handleMenuClick(event) { if (window.innerWidth <= 992) { closeSidebar(); } }

    function toggleVideoPlayer(btn) {
        const fileRow = btn.closest('.file-row');
        const mediaElement = fileRow.querySelector('.preview-card-box video, .preview-card-box iframe');
        const btnText = btn.querySelector('span');
        const btnIcon = btn.querySelector('i');
        const isVideo = mediaElement.tagName === 'VIDEO';

        if (fileRow.classList.contains('is-expanded')) {
            fileRow.classList.remove('is-expanded');
            btnText.innerText = "Play"; btnIcon.className = "fa-solid fa-play";
            if (isVideo) { mediaElement.removeAttribute('controls'); mediaElement.muted = true; mediaElement.pause(); }
        } else {
            fileRow.classList.add('is-expanded');
            btnText.innerText = "Close"; btnIcon.className = "fa-solid fa-xmark";
            if (isVideo) { mediaElement.setAttribute('controls', 'true'); mediaElement.muted = false; mediaElement.play(); }
        }
    }

    function handleThumbnailClick(box) {
        const fileRow = box.closest('.file-row');
        if (!fileRow.classList.contains('is-expanded')) {
            toggleVideoPlayer(fileRow.querySelector('.btn-play-toggle'));
        }
    }
   
    
    document.addEventListener('contextmenu', event => event.preventDefault());

   
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // F12
